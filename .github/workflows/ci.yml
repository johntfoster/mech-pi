name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feature/**'
      - 'issue/**'
  pull_request:
    branches: [main]

concurrency:
  group: mech-pi-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-policy:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/pr-policy.yml
    permissions:
      contents: read
      pull-requests: read
      issues: read

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

